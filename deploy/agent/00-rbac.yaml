apiVersion: v1
kind: Namespace
metadata:
  name: ai-sre
  labels:
    app.kubernetes.io/part-of: ai-k8s-sre-operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-sre-agent
  namespace: ai-sre
---
# The agent needs read access to pods and pods/log across namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-sre-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-sre-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-sre-agent
subjects:
  - kind: ServiceAccount
    name: ai-sre-agent
    namespace: ai-sre
