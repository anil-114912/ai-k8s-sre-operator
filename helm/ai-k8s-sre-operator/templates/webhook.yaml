{{- if .Values.webhook.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-k8s-sre-operator.fullname" . }}-webhook
  labels:
    {{- include "ai-k8s-sre-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ai-k8s-sre-operator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: webhook
  template:
    metadata:
      labels:
        {{- include "ai-k8s-sre-operator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: webhook
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ai-k8s-sre-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: webhook
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.webhook.image | default (printf \"%s:%s\" .Values.image.repository .Values.image.tag) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - uvicorn
            - webhook.injection:app
            - --host
            - "0.0.0.0"
            - --port
            - "{{ .Values.webhook.port }}"
            - --ssl-keyfile
            - /tls/tls.key
            - --ssl-certfile
            - /tls/tls.crt
          ports:
            - name: https
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
          volumeMounts:
            - name: tls-certs
              mountPath: /tls
              readOnly: true
          env:
            - name: SRE_API_URL
              value: "http://{{ include "ai-k8s-sre-operator.fullname" . }}-api:{{ .Values.service.port }}"
            - name: SIDECAR_IMAGE
              value: "{{ .Values.image.repository }}/sidecar:{{ .Values.image.tag }}"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.webhook.port }}
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: tls-certs
          secret:
            secretName: {{ include "ai-k8s-sre-operator.fullname" . }}-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-k8s-sre-operator.fullname" . }}-webhook
  labels:
    {{- include "ai-k8s-sre-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: {{ .Values.webhook.port }}
      protocol: TCP
      name: https
  selector:
    {{- include "ai-k8s-sre-operator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "ai-k8s-sre-operator.fullname" . }}-sidecar-injector
  {{- if .Values.webhook.certManager }}
  annotations:
    cert-manager.io/inject-ca-from: "{{ .Release.Namespace }}/{{ include "ai-k8s-sre-operator.fullname" . }}-webhook-cert"
  {{- end }}
webhooks:
  - name: sidecar.ai-sre.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy | default "Ignore" }}
    clientConfig:
      service:
        name: {{ include "ai-k8s-sre-operator.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /inject
      {{- if .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
    rules:
      - apiGroups:   [""]
        apiVersions: ["v1"]
        operations:  ["CREATE"]
        resources:   ["pods"]
    namespaceSelector:
      {{- toYaml .Values.webhook.namespaceSelector | nindent 6 }}
{{- end }}
