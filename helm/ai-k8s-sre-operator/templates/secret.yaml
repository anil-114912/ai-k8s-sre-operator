{{- if and (not .Values.llm.existingSecret) .Values.llm.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-k8s-sre-operator.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-k8s-sre-operator.labels" . | nindent 4 }}
type: Opaque
data:
  LLM_API_KEY: {{ .Values.llm.apiKey | b64enc | quote }}
{{- end }}
