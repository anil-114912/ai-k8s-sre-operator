apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-k8s-sre-operator.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-k8s-sre-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "ai-k8s-sre-operator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-k8s-sre-operator.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-k8s-sre-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: {{ .Values.ui.port }}
      protocol: TCP
      name: ui
  selector:
    {{- include "ai-k8s-sre-operator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
