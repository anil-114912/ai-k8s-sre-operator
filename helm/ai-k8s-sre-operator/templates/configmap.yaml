apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-k8s-sre-operator.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-k8s-sre-operator.labels" . | nindent 4 }}
data:
  OPERATOR_DRY_RUN: {{ .Values.operator.dryRun | quote }}
  AUTO_FIX_ENABLED: {{ .Values.operator.autoFixEnabled | quote }}
  DEMO_MODE: {{ .Values.operator.demoMode | quote }}
  PROMETHEUS_URL: {{ .Values.prometheus.url | quote }}
  LOKI_URL: {{ .Values.loki.url | quote }}
  LOG_LEVEL: {{ .Values.operator.logLevel | quote }}
  LLM_PROVIDER: {{ .Values.llm.provider | quote }}
  COOLDOWN_SECS: {{ .Values.operator.cooldownSecs | quote }}
  WATCH_INTERVAL_SECS: {{ .Values.operator.watchIntervalSecs | quote }}
  DENIED_NAMESPACES: {{ .Values.operator.deniedNamespaces | join "," | quote }}
  DATABASE_URL: {{ .Values.database.url | quote }}
  CLUSTER_PROVIDER: {{ .Values.cluster.provider | quote }}
