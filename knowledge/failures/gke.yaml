- id: gke-001
  title: "GKE Workload Identity missing or misconfigured"
  scope: pod
  symptoms:
    - "Google API permission denied in pod logs"
    - "Unable to authenticate with Workload Identity"
    - "Metadata server returns 403"
  event_patterns:
    - "workload identity"
    - "PERMISSION_DENIED"
    - "iam"
  log_patterns:
    - "PERMISSION_DENIED"
    - "workload identity"
    - "unable to authenticate"
    - "google.golang.org/grpc"
    - "403 Forbidden"
    - "ServiceAccountTokenCreator"
    - "iam.googleapis.com"
  metric_patterns: []
  root_cause: "The GKE Workload Identity binding between the Kubernetes ServiceAccount and the Google Service Account (GSA) is missing or the IAM policy binding is incorrect"
  remediation_steps:
    - "Check KSA annotation: kubectl get sa <ksa-name> -n <namespace> -o yaml | grep iam.gke.io"
    - "Verify IAM binding: gcloud iam service-accounts get-iam-policy <gsa-name>@<project>.iam.gserviceaccount.com"
    - "Create binding: gcloud iam service-accounts add-iam-policy-binding <gsa-name>@<project>.iam.gserviceaccount.com --role=roles/iam.workloadIdentityUser --member='serviceAccount:<project>.svc.id.goog[<namespace>/<ksa-name>]'"
    - "Annotate KSA: kubectl annotate sa <ksa-name> -n <namespace> iam.gke.io/gcp-service-account=<gsa-name>@<project>.iam.gserviceaccount.com"
    - "Restart pods to pick up Workload Identity token"
  confidence_hints:
    - pattern: "PERMISSION_DENIED"
      boost: 0.3
    - pattern: "workload identity"
      boost: 0.4
  safe_auto_fix: false
  safety_level: suggest_only
  tags: [gke, gcp, workload-identity, iam, serviceaccount, permissions]
  provider: gcp

- id: gke-002
  title: "GKE Autopilot resource quota exceeded"
  scope: cluster
  symptoms:
    - "Pod evicted or not scheduled on Autopilot"
    - "Resource request exceeds Autopilot maximums"
    - "GKE Autopilot quota limit hit"
  event_patterns:
    - "autopilot"
    - "quota exceeded"
    - "resource limit"
    - "evicted"
  log_patterns:
    - "autopilot"
    - "quota exceeded"
    - "resource request"
    - "maximum allowed"
  metric_patterns: []
  root_cause: "GKE Autopilot has per-namespace resource quotas and maximum per-pod resource limits that the workload exceeds — Autopilot enforces stricter resource constraints than standard GKE"
  remediation_steps:
    - "Check Autopilot constraints: kubectl describe resourcequota -n <namespace>"
    - "Review pod resource requests: kubectl get pod <name> -n <namespace> -o yaml | grep -A10 resources"
    - "Reduce pod memory/CPU requests to fit within Autopilot limits"
    - "Split large workloads across multiple pods"
    - "Request quota increase via GCP console: IAM & Admin > Quotas"
    - "Consider migrating large workloads to standard GKE node pools"
  confidence_hints:
    - pattern: "autopilot"
      boost: 0.4
    - pattern: "quota exceeded"
      boost: 0.3
  safe_auto_fix: false
  safety_level: suggest_only
  tags: [gke, gcp, autopilot, quota, resources, scheduling]
  provider: gcp

- id: gke-004
  title: "GKE Node Auto-Provisioning (NAP) fails to create new node pool"
  scope: cluster
  symptoms:
    - "Cluster Autoscaler cannot provision nodes via NAP"
    - "NAP node pool stuck in provisioning"
    - "Pods Pending despite NAP being enabled"
    - "Failed to create node pool via auto-provisioning"
  event_patterns:
    - "node auto-provisioning"
    - "NAP"
    - "cluster-autoscaler"
    - "failed to provision"
    - "node pool"
  log_patterns:
    - "node auto-provisioning"
    - "nap"
    - "failed to create node pool"
    - "auto-provisioning"
    - "resource limit"
    - "cluster autoscaler"
  metric_patterns:
    - "cluster_autoscaler_unschedulable_pods_count > 0"
  root_cause: "GKE Node Auto-Provisioning (NAP) cannot create a new node pool — common causes include NAP resource limits (max CPU/memory per cluster), missing GPU quota, no valid machine type matching pod requests, or a GCP resource quota being exhausted"
  remediation_steps:
    - "Check cluster-autoscaler logs: kubectl logs -n kube-system -l k8s-app=cluster-autoscaler"
    - "View NAP resource limits: gcloud container clusters describe <cluster> --zone <zone> | grep autoprovisioning"
    - "Increase NAP resource limits: gcloud container clusters update <cluster> --enable-autoprovisioning --max-cpu <n> --max-memory <gb>"
    - "Check GCP project quotas: gcloud compute regions describe <region> | grep -A2 quota"
    - "Request quota increase via GCP Console: IAM & Admin > Quotas"
    - "If GPU is needed: request GPU quota in the target region"
    - "As fallback: manually create a node pool with the required machine type"
  confidence_hints:
    - pattern: "node auto-provisioning"
      boost: 0.5
    - pattern: "nap"
      boost: 0.4
    - pattern: "failed to create node pool"
      boost: 0.35
  safe_auto_fix: false
  safety_level: suggest_only
  tags: [gke, gcp, nap, autoprovisioning, autoscaler, quota, node-pool]
  provider: gcp

- id: gke-005
  title: "GKE Binary Authorization policy blocking pod admission"
  scope: pod
  symptoms:
    - "Pod admission denied by Binary Authorization"
    - "Image not attested or policy not satisfied"
    - "DENIED_BY_BREAKGLASS_ATTESTOR or no attestation found"
  event_patterns:
    - "BinaryAuthorization"
    - "attestation"
    - "admission denied"
    - "policy violation"
    - "image not allowed"
  log_patterns:
    - "binary authorization"
    - "attestation"
    - "admission denied"
    - "policy violation"
    - "image not allowed"
    - "binauthz"
    - "attestor"
  metric_patterns: []
  root_cause: "GKE Binary Authorization is enforcing an admission policy that requires container images to have valid attestations (signed by a trusted attestor) before they can run — the image being deployed lacks the required attestation or the policy is in enforcing mode"
  remediation_steps:
    - "Check the Binary Authorization denial reason in pod events: kubectl describe pod <name> -n <namespace>"
    - "View current policy: gcloud container binauthz policy export"
    - "Check image attestations: gcloud container binauthz attestations list --attestor=<name> --attestor-project=<project>"
    - "To unblock quickly: switch policy to DRY_RUN mode while investigating: gcloud container binauthz policy import <policy.yaml>"
    - "Create an attestation for the image: gcloud container binauthz attestations sign-and-create --artifact-url=<image-digest> --attestor=<name> --attestor-project=<project> --keyversion=<kms-keyversion>"
    - "Long term: integrate attestation signing into your CI/CD pipeline"
  confidence_hints:
    - pattern: "binary authorization"
      boost: 0.5
    - pattern: "attestation"
      boost: 0.4
    - pattern: "admission denied"
      boost: 0.25
  safe_auto_fix: false
  safety_level: suggest_only
  tags: [gke, gcp, binary-authorization, binauthz, admission, security, attestation]
  provider: gcp

- id: gke-003
  title: "GKE Filestore (NFS) mount failure"
  scope: pod
  symptoms:
    - "Filestore volume mount timeout"
    - "NFS mount failed in pod events"
    - "access denied to Filestore share"
  event_patterns:
    - "Filestore"
    - "NFS"
    - "mount failed"
    - "FailedMount"
  log_patterns:
    - "filestore"
    - "nfs"
    - "mount failed"
    - "access denied"
    - "nfs mount"
    - "server not responding"
  metric_patterns: []
  root_cause: "The GKE pod cannot mount a Google Cloud Filestore NFS volume — causes include network connectivity issues, VPC firewall blocking NFS port 2049, Filestore instance not ready, or IP range conflicts"
  remediation_steps:
    - "Check FailedMount event: kubectl describe pod <name> -n <namespace>"
    - "Verify Filestore instance is READY: gcloud filestore instances list"
    - "Check VPC firewall rule allows TCP/UDP port 2049 from GKE node CIDR to Filestore IP"
    - "Test NFS connectivity: kubectl exec <pod> -- showmount -e <filestore-ip>"
    - "Verify Filestore IP and NFS export path in PV spec"
    - "Check authorized networks on Filestore instance"
  confidence_hints:
    - pattern: "Filestore"
      boost: 0.4
    - pattern: "NFS"
      boost: 0.25
    - pattern: "mount failed"
      boost: 0.2
  safe_auto_fix: false
  safety_level: suggest_only
  tags: [gke, gcp, filestore, nfs, storage, mount]
  provider: gcp
