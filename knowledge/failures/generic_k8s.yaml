    - "View node memory allocatable: kubectl get nodes -o custom-columns=NAME:.metadata.name,MEM:.status.allocatable.memory"
    - "Add nodes or scale existing node group"
    - "Reduce pod memory requests if appropriate: kubectl set resources deployment/<name> --requests=memory=<lower-value>"
  confidence_hints:
    - pattern: "Insufficient memory"
      boost: 0.4
  safe_auto_fix: false
  safety_level: approval_required
  tags: [pending, resources, memory, scheduling]

- id: k8s-010
  title: "Pod Pending — node selector mismatch"
  scope: pod
  symptoms:
    - "Pod status: Pending"
    - "FailedScheduling with node selector message"
    - "nodeSelector defined in pod spec"
  event_patterns:
    - "node selector"
    - "didn't match node selector"
    - "MatchNodeSelector"
    - "0/N nodes are available"
  log_patterns: []
  metric_patterns: []
  root_cause: "The pod has a nodeSelector that does not match any available node's labels — nodes may have been recreated without the required labels"
  remediation_steps:
    - "Check pod nodeSelector: kubectl get pod <name> -n <namespace> -o yaml | grep -A5 nodeSelector"
    - "List node labels: kubectl get nodes --show-labels"
    - "Label a node to match selector: kubectl label node <node-name> <key>=<value>"
    - "Or remove/update nodeSelector in deployment: kubectl edit deployment/<name> -n <namespace>"
  confidence_hints:
    - pattern: "MatchNodeSelector"
      boost: 0.4
    - pattern: "node selector"
      boost: 0.2
  safe_auto_fix: false
  safety_level: suggest_only
  tags: [pending, node-selector, scheduling]

- id: k8s-011
  title: "Service — selector mismatch, no endpoints"
  scope: service
  symptoms:
    - "Service has no endpoints"
    - "kubectl get endpoints shows empty"
    - "Connection refused to service"
  event_patterns:
    - "no endpoints"
    - "Endpoints not available"
  log_patterns:
    - "connection refused"
    - "no route to host"
    - "service unavailable"
  metric_patterns: []
  root_cause: "The Kubernetes Service selector labels do not match any running pod labels, leaving the service with empty endpoints and all traffic failing"
  remediation_steps:
    - "Check service selector: kubectl get svc <name> -n <namespace> -o yaml | grep -A5 selector"
    - "Check pod labels: kubectl get pods -n <namespace> --show-labels"
    - "Verify endpoints: kubectl get endpoints <name> -n <namespace>"
    - "Update service selector to match pod labels: kubectl patch svc <name> -n <namespace> -p '{\"spec\":{\"selector\":{\"app\":\"<correct-label>\"}}}'"
  confidence_hints:
    - pattern: "no endpoints"
      boost: 0.3
    - pattern: "selector"
      boost: 0.1
  safe_auto_fix: false
  safety_level: approval_required
  tags: [service, selector, endpoints, networking]

- id: k8s-012
  title: "Ingress — 404 or backend unavailable"
  scope: ingress
  symptoms:
    - "HTTP 404 or 503 from ingress"
    - "Ingress backend service missing"
    - "Ingress controller logs show upstream unavailable"
  event_patterns:
    - "no endpoints"
    - "service not found"
    - "backend unavailable"
  log_patterns:
    - "404"
    - "upstream unavailable"
    - "no endpoints in upstream"
    - "service not found"
  metric_patterns: []
  root_cause: "The Ingress rule references a backend Service that does not exist or has no healthy endpoints, causing 404/503 responses"
  remediation_steps:
    - "Check ingress backend: kubectl get ingress <name> -n <namespace> -o yaml"
    - "Verify backend service exists: kubectl get svc -n <namespace>"
    - "Check endpoints: kubectl get endpoints -n <namespace>"
    - "Fix service name typo in ingress or create the missing service"
  confidence_hints:
    - pattern: "service not found"
      boost: 0.3
    - pattern: "no endpoints in upstream"
      boost: 0.25
  safe_auto_fix: false
  safety_level: approval_required
  tags: [ingress, service, 404, 503, networking]
