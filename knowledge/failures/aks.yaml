- id: aks-001
  title: "AKS node pool capacity — VM quota exceeded"
  scope: cluster
  symptoms:
    - "Node pool scale-up fails"
    - "Azure VM quota exceeded error"
    - "Pods stuck Pending"
    - "Failed to provision new VMs"
  event_patterns:
    - "quota exceeded"
    - "QuotaExceeded"
    - "VM size quota"
    - "insufficient capacity"
  log_patterns:
    - "quota exceeded"
    - "vm quota"
    - "azure vm"
    - "insufficient capacity"
    - "subscription limit"
  metric_patterns: []
  root_cause: "The AKS node pool cluster-autoscaler cannot provision new VMs because the Azure subscription has hit the vCPU quota limit for the selected VM size family in the target region"
  remediation_steps:
    - "Check cluster-autoscaler logs: kubectl logs -n kube-system -l app=cluster-autoscaler"
    - "View Azure VM quota: az vm list-usage --location <region> -o table"
    - "Request quota increase in Azure Portal: Subscriptions > Usage + Quotas > Request Increase"
    - "Switch to a different VM size that has available quota: az aks nodepool update --resource-group <rg> --cluster-name <cluster> --name <nodepool> --vm-size <new-vm-size>"
    - "Enable Spot instances for non-critical workloads"
  confidence_hints:
    - pattern: "QuotaExceeded"
      boost: 0.45
    - pattern: "vm quota"
      boost: 0.35
  safe_auto_fix: false
  safety_level: suggest_only
  tags: [aks, azure, node-pool, quota, capacity, vm]
  provider: azure

- id: aks-002
  title: "AKS Managed Identity missing permissions"
  scope: pod
  symptoms:
    - "Azure API authentication failures in pods"
    - "Managed identity credential error"
    - "401 Unauthorized from Azure services"
  event_patterns:
    - "managed identity"
    - "authorization failed"
    - "IMDS"
  log_patterns:
    - "managed identity"
    - "msi credential"
    - "401 unauthorized"
    - "access denied"
    - "authentication failed"
    - "imds"
    - "azure.BearerAuthorizer"
  metric_patterns: []
  root_cause: "The pod's workload identity or managed identity does not have the required Azure RBAC role assignments to access the target Azure resource (Key Vault, Storage, etc.)"
  remediation_steps:
    - "Check pod identity annotation: kubectl get sa <name> -n <namespace> -o yaml | grep azure"
    - "Verify workload identity federation: az identity federated-credential list --identity-name <name> --resource-group <rg>"
    - "Assign required Azure role: az role assignment create --assignee <client-id> --role <role-name> --scope <resource-scope>"
    - "For AKS Workload Identity: verify azwi mutating webhook is installed"
    - "Test identity: kubectl exec <pod> -- curl -H 'Metadata: true' 'http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/'"
  confidence_hints:
    - pattern: "managed identity"
      boost: 0.4
    - pattern: "401 unauthorized"
      boost: 0.25
  safe_auto_fix: false
  safety_level: suggest_only
  tags: [aks, azure, managed-identity, workload-identity, rbac, permissions]
  provider: azure

- id: aks-004
  title: "AKS node pool VMSS in degraded provisioning state"
  scope: cluster
  symptoms:
    - "Node pool shows ProvisioningState: Failed or Updating"
    - "New nodes not joining cluster after scale-out"
    - "VMSS extension provisioning failure"
    - "Node stuck in NotReady after scale event"
  event_patterns:
    - "ProvisioningFailed"
    - "vmss"
    - "node pool"
    - "provisioning state"
    - "extension"
  log_patterns:
    - "provisioning state"
    - "vmss"
    - "extension failed"
    - "custom script extension"
    - "node not ready"
    - "bootstrap failed"
  metric_patterns: []
  root_cause: "The AKS node pool VMSS (Virtual Machine Scale Set) has a VM instance in a failed provisioning state — often caused by a VM extension failure during node bootstrap, a custom script error, or an Azure resource quota issue at the VMSS level"
  remediation_steps:
    - "Check node pool status: az aks nodepool show --resource-group <rg> --cluster-name <cluster> --name <nodepool>"
    - "List VMSS instances: az vmss list-instances --resource-group <node-rg> --name <vmss-name> -o table"
    - "Check instance model for failed extensions: az vmss get-instance-view --resource-group <node-rg> --name <vmss-name> --instance-id <id>"
    - "Reimage the failed VMSS instance: az vmss reimage --resource-group <node-rg> --name <vmss-name> --instance-ids <id>"
    - "If bootstrap keeps failing: delete the NotReady node and let cluster-autoscaler replace it"
    - "Check for quota issues: az vm list-usage --location <region> -o table"
  confidence_hints:
    - pattern: "vmss"
      boost: 0.35
    - pattern: "provisioning state"
      boost: 0.35
    - pattern: "extension failed"
      boost: 0.4
  safe_auto_fix: false
  safety_level: suggest_only
  tags: [aks, azure, vmss, node-pool, provisioning, bootstrap]
  provider: azure

- id: aks-005
  title: "AKS Workload Identity webhook not injecting credentials"
  scope: pod
  symptoms:
    - "Pod missing AZURE_CLIENT_ID or AZURE_FEDERATED_TOKEN_FILE env vars"
    - "azure-wi-webhook not mutating pod spec"
    - "Workload Identity annotation present but credentials absent"
  event_patterns:
    - "webhook"
    - "workload identity"
    - "mutation"
    - "azure.workload.identity"
  log_patterns:
    - "AZURE_CLIENT_ID"
    - "AZURE_FEDERATED_TOKEN_FILE"
    - "workload identity"
    - "azure.workload.identity"
    - "webhook"
    - "not injected"
    - "mutating webhook"
  metric_patterns: []
  root_cause: "The AKS Workload Identity mutating webhook (azure-wi-webhook) is not injecting the required environment variables and volume mounts into the pod — usually because the webhook pod is unhealthy, the pod ServiceAccount lacks the azure.workload.identity/client-id annotation, or the MutatingWebhookConfiguration is misconfigured"
  remediation_steps:
    - "Check webhook pod health: kubectl get pods -n azure-workload-identity-system"
    - "Inspect webhook logs: kubectl logs -n azure-workload-identity-system -l app=azure-wi-webhook-controller-manager"
    - "Verify ServiceAccount annotation: kubectl get sa <name> -n <namespace> -o yaml | grep azure.workload.identity"
    - "Add annotation if missing: kubectl annotate sa <name> -n <namespace> azure.workload.identity/client-id=<client-id>"
    - "Check pod label: pod must have label azure.workload.identity/use=true"
    - "Verify MutatingWebhookConfiguration: kubectl get mutatingwebhookconfiguration azure-wi-webhook-mutating-webhook-configuration -o yaml"
    - "Restart webhook deployment if unhealthy: kubectl rollout restart deployment -n azure-workload-identity-system"
  confidence_hints:
    - pattern: "AZURE_FEDERATED_TOKEN_FILE"
      boost: 0.5
    - pattern: "workload identity"
      boost: 0.35
    - pattern: "mutating webhook"
      boost: 0.3
  safe_auto_fix: false
  safety_level: suggest_only
  tags: [aks, azure, workload-identity, webhook, mutation, serviceaccount]
  provider: azure

- id: aks-003
  title: "AKS Azure Disk volume attach failure"
  scope: pod
  symptoms:
    - "FailedAttachVolume event for Azure Disk"
    - "Pod stuck in ContainerCreating"
    - "Azure Disk cannot be attached to different node"
  event_patterns:
    - "FailedAttachVolume"
    - "Azure Disk"
    - "WaitForAttach"
    - "disk"
  log_patterns:
    - "azure disk"
    - "disk attach failed"
    - "failed to attach volume"
    - "disk cannot be attached"
    - "azure disk attach error"
  metric_patterns: []
  root_cause: "An Azure Disk (ReadWriteOnce PVC) is stuck attached to a different node than where the pod is being scheduled, or the disk detach from the previous node failed"
  remediation_steps:
    - "Identify stuck VolumeAttachment: kubectl get volumeattachment | grep <pv-name>"
    - "Delete stuck VolumeAttachment to force re-attach: kubectl delete volumeattachment <name>"
    - "Check if old pod is truly terminated: kubectl get pods --all-namespaces | grep Terminating"
    - "Force delete stuck pod: kubectl delete pod <name> -n <namespace> --force --grace-period=0"
    - "For multi-node access: switch to Azure Files (ReadWriteMany) instead of Azure Disk"
    - "Check azure-disk-csi-driver logs: kubectl logs -n kube-system -l app=csi-azuredisk-node"
  confidence_hints:
    - pattern: "FailedAttachVolume"
      boost: 0.4
    - pattern: "Azure Disk"
      boost: 0.3
  safe_auto_fix: false
  safety_level: suggest_only
  tags: [aks, azure, disk, pvc, storage, volume-attach]
  provider: azure
